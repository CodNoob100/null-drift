name: Compliance Bots

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  check-direct-push:
    name: PR Enforcement Bot
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - name: Prevent direct push to main
        run: |
          commit_message=$(git log -1 --pretty=format:"%s")
          if [[ "$commit_message" != Merge* ]] && [[ "$commit_message" != *"Merge pull request"* ]]; then
            echo "ERROR: Direct pushes to main are strictly forbidden. You must use a Pull Request."
            exit 1
          fi


  enforce-branch-protection:
    name: Self-Healing Branch Protection
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Enforce Branch Protection via GitHub API
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        run: |
          echo '{
            "required_status_checks": {
              "strict": true,
              "contexts": ["Contributing Rules Bot"]
            },
            "enforce_admins": true,
            "required_pull_request_reviews": {
              "dismiss_stale_reviews": false,
              "require_code_owner_reviews": false,
              "required_approving_review_count": 0
            },
            "restrictions": null,
            "allow_force_pushes": false,
            "allow_deletions": false
          }' > protection.json
          gh api -X PUT /repos/${{ github.repository }}/branches/main/protection --input protection.json || echo "Warning: PAT may lack admin privileges, but rules are active."

  check-contributing-rules:
    name: Contributing Rules Bot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Restrict Workflow and Bot Edits
        if: github.event_name == 'pull_request' && !contains(fromJSON('["OWNER", "COLLABORATOR", "MEMBER"]'), github.event.pull_request.author_association)
        run: |
          git fetch origin main
          CHANGED_FILES=$(git diff --name-only origin/main...HEAD)
          if echo "$CHANGED_FILES" | grep -qE '^(\.github/workflows/|tools/bots/)'; then
            echo "ERROR: You do not have permission to modify CI workflows or bots."
            exit 1
          fi


      - name: Install Rust
        run: |
          rustup toolchain install nightly
          rustup default nightly
          rustup component add clippy rustfmt
      - name: Code Formatting Check (cargo fmt)
        run: cargo fmt --check

      - name: Zero-Warnings Policy (cargo clippy)
        run: cargo clippy --workspace --lib --bins -- -D warnings

      - name: Python Formatting Check (black)
        run: |
          pip install black
          black --check .

      - name: Python Linter Check (flake8)
        run: |
          pip install flake8
          flake8 . --max-line-length=120

      - name: Check for duplicate dependencies
        run: |
          cargo tree --duplicates > dupes.txt || true
          if [ -s dupes.txt ]; then
            echo "ERROR: Duplicate dependencies found!"
            cat dupes.txt
            exit 1
          fi

      - name: Check TODO formats
        run: python3 tools/bots/check_todos.py



      - name: Check Code Quality & Dead Code Policies
        run: python3 tools/bots/check_quality.py


