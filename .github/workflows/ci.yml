name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 9 * * 1' # Every Monday 09:00 UTC

env:
  CARGO_TERM_COLOR: always

jobs:
  dependency-audit:
    name: Security audit
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Check exception expiry
        run: python3 tools/audit/check_exceptions.py

      - name: Run cargo audit
        run: |
          cargo audit \
            --deny vulnerability \
            --deny unsound \
            --deny yanked \
            --file audit.toml

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-report-${{ github.sha }}
          path: Cargo.lock # Just uploading lockfile for now as cargo audit doesn't output json file directly without extra config
          retention-days: 90

  scheduled-audit:
    name: Weekly CVE scan
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run audit with advisory database update
        run: |
          cargo audit --update

      - name: File issue on new finding
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'CVE detected in dependency scan',
              labels: ['security', 'P0'],
              body: 'cargo audit found a new vulnerability. See CI run: ' +
                    context.serverUrl + '/' + context.repo.owner + '/' +
                    context.repo.repo + '/actions/runs/' + context.runId
            })

  unit-and-integration:
    name: Unit & Integration (QEMU UART mode)
    runs-on: ubuntu-latest
    needs: dependency-audit
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4

      - name: Install RISC-V toolchain
        run: |
          rustup target add riscv64gc-unknown-none-elf
          sudo apt-get install -y qemu-system-misc

      - name: Check formatting
        run: cargo fmt --check
        
      - name: Run Clippy
        run: cargo clippy --target riscv64gc-unknown-none-elf -- -D warnings

      - name: Verify mseccfg Isolation Contract
        run: |
          if grep -rnE "csrw\s+0x747|csrw\s+mseccfg" kernel/src/ | grep -vE "capabilities\.rs|boot\.rs"; then
            echo "ERROR: mseccfg write found outside Sandbox Security Lead modules!"
            exit 1
          fi

      - name: Run tests
        timeout-minutes: 5
        run: cargo test --target riscv64gc-unknown-none-elf

  system-validation:
    name: System validation (QMP descriptor mode)
    runs-on: ubuntu-latest
    needs: unit-and-integration
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4

      - name: Install RISC-V toolchain
        run: |
          rustup target add riscv64gc-unknown-none-elf
          sudo apt-get install -y qemu-system-misc

      - name: Build debug kernel
        run: cargo build --target riscv64gc-unknown-none-elf

      - name: Run system validation suite
        timeout-minutes: 10
        run: python3 tools/system-validate/check_descriptor.py
