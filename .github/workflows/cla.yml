name: "CLA Assistant"
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

jobs:
  CLAAssistant:
    runs-on: ubuntu-latest
    steps:
      - name: "CLA Assistant"
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.3.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Use a personal access token with repo scope to store signatures in a private repo or branch
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        with:
          path-to-signatures: 'signatures/version1/cla.json'
          path-to-document: 'https://github.com/oxidian-os/oxidian/blob/main/CONTRIBUTING.md#1-contributor-license-agreement-cla' # Links to the CLA text
          # branch should not be protected
          branch: 'cla-signatures'
          allowlist: bot*
          
          # Custom Messages
          custom-notsigned-prcomment: 'Thank you for your submission to Oxidian! To ensure the long-term legal sustainability of the project, we require all contributors to sign our Contributor License Agreement (CLA).<br/>Please leave a comment below saying exactly: **I have read the CLA Document and I hereby sign the CLA**'
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: 'All Contributors have signed the CLA. Thank you!'
